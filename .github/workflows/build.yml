name: Java CI with Gradle

# 1. 触发条件：当向 main 分支推送代码或提交 Pull Request 时触发
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # 2. 指定运行环境为最新的 Ubuntu 系统
    runs-on: ubuntu-latest

    steps:
      # 3. 拉取代码仓库的最新代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 4. 设置 JDK 环境（这里以 Java 17 为例）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 5. 设置 Gradle 环境并自动开启依赖缓存
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 6. 【防错步骤】动态生成 Gradle Wrapper
      # 如果仓库中遗漏了 gradlew 文件，此步骤会自动生成它，避免后续报错
      - name: Generate Gradle Wrapper (Fallback)
        run: gradle wrapper --gradle-version 8.5

      # 7. 赋予 gradlew 脚本可执行权限（Linux/Mac 环境必备）
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 8. 使用 Gradle 执行构建
      - name: Build with Gradle
        run: ./gradlew build

      # 9. 上传构建产物（方便在 GitHub 页面上直接下载 JAR 包）
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Package
          path: build/libs
