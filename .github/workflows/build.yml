name: Java CI with Gradle

# 1. 定义触发条件：当向 main 分支推送代码或提交 Pull Request 时触发
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # 2. 指定运行环境为最新的 Ubuntu 系统
    runs-on: ubuntu-latest

    steps:
      # 3. 拉取代码仓库的最新代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 4. 设置 JDK 环境（这里以 Java 17 为例）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 5. 设置 Gradle 环境并自动开启依赖缓存
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 6. 赋予 gradlew 脚本可执行权限（Linux/Mac 环境推荐）
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 7. 使用 Gradle 构建 JAR 包
      - name: Build with Gradle
        run: ./gradlew build
